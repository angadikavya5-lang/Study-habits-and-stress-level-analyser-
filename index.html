<!DOCTYPE html>
<html>
<head>
<title>Study Habit & Stress Level Analyzer</title>

<style>

body{
font-family: Arial, sans-serif;
margin:0;
background:#eef3f8;
text-align:center;
}

/* HEADER */
header{
background:#2c5aa0;
color:white;
padding:25px;
}

h1{
margin:0;
font-size:40px;
}

h2{
margin-top:5px;
font-weight:normal;
}

/* CONTAINER */
.container{
background:white;
width:400px;
margin:40px auto;
padding:25px;
border-radius:12px;
box-shadow:0 0 12px rgba(0,0,0,0.2);
}

/* INPUTS */
input{
width:90%;
padding:10px;
margin:10px;
font-size:16px;
border-radius:6px;
border:1px solid gray;
}

/* BUTTON */
button{
background:#2c5aa0;
color:white;
border:none;
padding:12px 20px;
font-size:16px;
border-radius:6px;
cursor:pointer;
}

button:hover{
background:#1d3f75;
}

/* RESULT BOX */
#result{
margin-top:20px;
font-size:18px;
font-weight:bold;
padding:15px;
border-radius:8px;
}

.low{background:#c8f7c5;color:green;}
.moderate{background:#fff3b0;color:#a67c00;}
.high{background:#ffc9c9;color:red;}

footer{
margin-top:30px;
padding:10px;
color:gray;
}

</style>
</head>

<body>
